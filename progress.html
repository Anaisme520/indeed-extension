<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nurtureme - Indeed Progress</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      padding: 32px;
      max-width: 580px;
      margin: 0 auto;
    }
    .header {
      text-align: center; margin-bottom: 24px;
    }
    .header h1 { font-size: 24px; color: #1e293b; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #64748b; }
    .card {
      background: white; border-radius: 12px; padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 20px;
    }
    .card h2 { font-size: 16px; color: #334155; margin-bottom: 12px; }
    .progress-bar {
      height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #3b82f6; border-radius: 4px; transition: width 0.3s;
    }
    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: #1e293b; }
    .stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .log {
      background: #f1f5f9; border-radius: 8px; padding: 12px; font-family: monospace;
      font-size: 12px; max-height: 180px; overflow-y: auto; margin-top: 12px;
    }
    .log-line { margin-bottom: 4px; }
    .log-line.success { color: #059669; }
    .log-line.error { color: #dc2626; }
    .log-line.info { color: #2563eb; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Indeed Candidate Export</h1>
    <p>Scraping and uploading candidates from Indeed</p>
  </div>

  <div class="card">
    <h2>Progress</h2>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="processedCount">0</div>
        <div class="stat-label">Processed</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="storedCount">0</div>
        <div class="stat-label">Stored</div>
      </div>
    </div>
    <div class="log" id="log"></div>
  </div>

  <script src="progress.js"></script>
</body>
</html>
